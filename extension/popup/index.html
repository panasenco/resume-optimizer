<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8"/>
        <link rel="stylesheet" href="protocol.css"/>
        <link rel="stylesheet" href="protocol-components.css"/>
        <link rel="stylesheet" href="custom.css"/>
    </head>
    <body>
        <div class="mzp-l-content">
            <form class="mzp-c-form" id="optimizer-form">
                <div class="mzp-c-form-header">
                    <h2 class="mzp-c-form-title">Resume Optimizer</h2>
                    <span class="mzp-c-fieldnote">Currently supported sites: <a href="https://www.indeed.com/">Indeed</a></span>
                </div>
                <!-- <legend class="mzp-c-form-subtitle">Subtitle</legend> -->
                <div class="mzp-c-field">
                    <label class="mzp-c-field-label" for="resume-content">Enter your <a href="https://github.com/panasenco/ambiguity">Ambiguity</a>-templated <a href="https://jsonresume.org/">JSON Resume</a> JSON </label>
                    <textarea class="mzp-c-field-control" name="resume-content" id="resume-content" rows="10" cols="60"></textarea>
                </div>
                <div class="mzp-c-field">
                    <label class="mzp-c-field-label" for="resume-theme">Select your JSON Resume <a href="https://jsonresume.org/themes/">theme</a></label>
                    <select class="mzp-c-field-control" name="resume-theme" id="resume-theme">
                        <option value="onepage">OnePage</option>
                    </select>
                </div>
                <footer class="mzp-c-form-footer">
                    <div class="mzp-c-button-container mzp-l-h-between">
                        <button class="mzp-c-button" type="submit">Save</button>
			<button class="mzp-c-button mzp-t-secondary" type="reset" id="template-to-clipboard">Template &#8594; Clipboard</button>
			<button class="mzp-c-button mzp-t-secondary" type="reset" id="skills-to-clipboard">Skills &#8594; Clipboard</button>
                        <!-- <p class="mzp-c-button-info">Footer paragraph</p> -->
                    </div>
                </footer>
            </form>
        </div>
	<script src="index.js"></script>
    </body>
</html>
